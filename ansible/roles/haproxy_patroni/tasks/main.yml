---
- name: Install HAProxy
  become: true
  ansible.builtin.apt:
    name: haproxy
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Render the HAProxy config
  become: true
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
    validate: haproxy -c -f %s
  notify: Reload haproxy

- name: Enable and start HAProxy
  become: true
  ansible.builtin.systemd_service:
    name: haproxy
    enabled: true
    state: started
