---
# Incus from the Zabbly repo (the upstream Incus repository) — the Ubuntu archive
# ships Incus but omits the web UI. The lts-7.0 channel gives Incus 7.0.x LTS plus
# incus-ui-canonical (the daemon-served web UI). Storage tooling stays from the OS.
incus_zabbly_channel: lts-7.0
incus_packages:
  - incus
  - incus-ui-canonical
incus_tooling:
  - lvm2
  - btrfs-progs

# Storage: a dedicated LV carved from the OS volume group's free space, which
# Incus formats btrfs (CoW + snapshots, in-kernel). Incus's LVM driver insists on
# owning a whole empty VG, so we give it a block device instead of sharing the VG.
# Override incus_storage_size per host if the disk differs.
incus_storage_pool: default
incus_storage_vg: ubuntu-vg
incus_storage_lv: incus
incus_storage_size: 120g

# Remote API listener so the Incus client and Terraform can manage the host.
incus_https_address: "[::]:8443"

# Host NIC that carries the tagged lab VLANs (a trunk port). Per-VLAN bridges are
# built on top of it. Defaults to the interface holding the default route: base
# matches the NIC by glob but doesn't rename it, so the real kernel name (e.g.
# enp0s31f6) is what the VLAN link needs, not the logical "lab0". Override per host.
incus_uplink_interface: "{{ ansible_default_ipv4.interface }}"

# Lab VLANs exposed to instances. Each entry renders <uplink>.<vlan> -> <bridge>
# in netplan and an Incus profile with a bridged NIC on that bridge. The host
# keeps its own address on the uplink (servers VLAN); these bridges carry no host IP.
incus_networks:
  - name: services
    vlan: 30
    bridge: br30

# Clustering for a single management plane across the nodes. The bootstrap member
# converts in place (incus cluster enable); the rest join with a single-use token
# minted on the bootstrap. Set incus_cluster_bootstrap_host to the bootstrap's
# inventory_hostname in inventory (required when clustering). Storage stays local
# per member — the cluster needs no shared storage.
incus_cluster_enabled: true
incus_cluster_bootstrap_host: ""
incus_cluster_member_name: "{{ inventory_hostname }}"
incus_cluster_address: "{{ ansible_default_ipv4.address }}"
