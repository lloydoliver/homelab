---
- name: Install Incus and storage tooling
  become: true
  ansible.builtin.apt:
    name: "{{ incus_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Allow the ansible user to drive Incus
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: incus-admin
    append: true

- name: Render per-VLAN bridges for instance networking
  become: true
  ansible.builtin.template:
    src: incus-netplan.yaml.j2
    dest: /etc/netplan/70-incus.yaml
    owner: root
    group: root
    mode: "0600"
  notify: Apply incus netplan

- name: Bring the bridges up before any profile references them
  ansible.builtin.meta: flush_handlers

# Every member has its own local storage; in a cluster the pool is defined
# cluster-wide with a per-member source.
- name: Carve a dedicated LV for Incus storage
  become: true
  community.general.lvol:
    vg: "{{ incus_storage_vg }}"
    lv: "{{ incus_storage_lv }}"
    size: "{{ incus_storage_size }}"
    state: present

- name: Detect existing storage pools
  become: true
  ansible.builtin.command: incus storage list --format csv
  register: _incus_storage
  changed_when: false
  failed_when: false

- name: Detect cluster membership
  become: true
  ansible.builtin.command: incus cluster list --format csv
  register: _incus_cluster
  changed_when: false
  failed_when: false

- name: Establish whether this host bootstraps the cluster
  ansible.builtin.set_fact:
    _incus_is_bootstrap: "{{ (not incus_cluster_enabled) or inventory_hostname == incus_cluster_bootstrap_host }}"
    _incus_is_member: "{{ incus_cluster_member_name in _incus_cluster.stdout }}"

# --- Bootstrap member (or a standalone host) ---
- name: Initialise the bootstrap member from preseed
  become: true
  ansible.builtin.command:
    cmd: incus admin init --preseed
    stdin: "{{ lookup('template', 'incus-preseed.yml.j2') }}"
  when:
    - _incus_is_bootstrap
    - incus_storage_pool not in _incus_storage.stdout
  changed_when: true

# Clustering uses core.https_address as the member's cluster address and rejects a
# wildcard, so bind it to this host's real IP before enabling.
- name: Bind the bootstrap API to a specific address
  become: true
  ansible.builtin.command: "incus config set core.https_address {{ incus_cluster_address }}:8443"
  when:
    - incus_cluster_enabled
    - _incus_is_bootstrap
    - not _incus_is_member
  changed_when: true

- name: Enable clustering on the bootstrap member
  become: true
  ansible.builtin.command: "incus cluster enable {{ incus_cluster_member_name }}"
  when:
    - incus_cluster_enabled
    - _incus_is_bootstrap
    - not _incus_is_member
  changed_when: true

- name: Ensure a profile exists per lab VLAN
  become: true
  ansible.builtin.command: "incus profile create {{ item.name }}"
  register: _incus_profile
  changed_when: _incus_profile.rc == 0
  failed_when: _incus_profile.rc != 0 and 'already exists' not in _incus_profile.stderr
  loop: "{{ incus_networks }}"
  when: _incus_is_bootstrap

- name: Give each VLAN profile a bridged NIC
  become: true
  ansible.builtin.command: "incus profile device add {{ item.name }} eth0 nic nictype=bridged parent={{ item.bridge }} name=eth0"
  register: _incus_profile_nic
  changed_when: _incus_profile_nic.rc == 0
  failed_when: _incus_profile_nic.rc != 0 and 'already exists' not in _incus_profile_nic.stderr
  loop: "{{ incus_networks }}"
  when: _incus_is_bootstrap

# --- Joining members ---
# The token is single-use and minted on the bootstrap, so only mint it when this
# host still needs to join.
- name: Mint a join token on the bootstrap member
  become: true
  ansible.builtin.command: "incus cluster add {{ incus_cluster_member_name }}"
  delegate_to: "{{ incus_cluster_bootstrap_host }}"
  register: _incus_join_token
  when:
    - incus_cluster_enabled
    - not _incus_is_bootstrap
    - not _incus_is_member
  changed_when: true

- name: Join the cluster
  become: true
  ansible.builtin.command:
    cmd: incus admin init --preseed
    stdin: "{{ lookup('template', 'incus-join.yml.j2') }}"
  when:
    - incus_cluster_enabled
    - not _incus_is_bootstrap
    - not _incus_is_member
  changed_when: true
