---
# Trust internal CAs (e.g. OpenBao's) via the system store, so reverse_proxy can
# verify those HTTPS upstreams and a route can drop tls_skip_verify. A CA change
# triggers a full RESTART, not a reload: Caddy caches the system trust pool at
# startup, so a graceful reload keeps the stale pool and the new CA is never trusted.
- name: Install trusted CA certificates for internal upstreams
  become: true
  ansible.builtin.copy:
    content: "{{ item.value }}"
    dest: "/usr/local/share/ca-certificates/{{ item.key }}.crt"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ caddy_trusted_ca_certs | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  notify:
    - Update CA trust
    - Restart Caddy

- name: Render the Caddyfile
  become: true
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ caddy_config_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload Caddy

# Gate the reload: a bad config fails the play here, before the handler runs, so
# Caddy keeps serving the previous config.
- name: Validate the Caddyfile
  become: true
  ansible.builtin.command: "{{ caddy_binary }} validate --adapter caddyfile --config {{ caddy_config_path }}"
  changed_when: false
