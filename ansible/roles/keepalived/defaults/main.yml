---
# VRRP floating IP across the DNS nodes. The active node holds the VIP; if its
# DNS service fails the priority drops and the VIP moves to the peer.
keepalived_interface: eth0
keepalived_vrid: 20
keepalived_vip: "" # required (the shared VIP)

# Per-host (host_vars): one node MASTER + higher priority, the rest BACKUP.
keepalived_state: BACKUP
keepalived_priority: 100

keepalived_auth_pass: "" # shared VRRP secret (from SOPS)

# Health check: a real DNS query against the local resolver, so a HUNG blocky
# (not just a stopped service) also yields the VIP. When it fails, |weight| is
# subtracted from this node's priority.
keepalived_check_command: "/etc/keepalived/check-dns.sh"
# weight MUST exceed the MASTER↔BACKUP priority gap, or a failed master only ties
# the backup and keeps the VIP (the zombie-master bug). e.g. 150 vs 100 → < -50.
# The deploy sets the real value to match its priorities.
keepalived_check_weight: -50
