---
# Observability stack on one monitoring Incus instance, via docker compose:
# VictoriaMetrics (vmsingle) for storage + scraping, vmalert for rules, Alertmanager
# posting to a self-hosted ntfy via ntfy's built-in alertmanager template, and Grafana.
# vmsingle over Prometheus deliberately — lighter + better compaction on the
# resource/heat-constrained rig. PromQL-compatible, so Grafana treats it as a
# Prometheus datasource.

monitoring_compose_dir: /opt/monitoring
monitoring_data_dir: "{{ monitoring_compose_dir }}/data"
monitoring_config_dir: "{{ monitoring_compose_dir }}/config"

# Pin to confirmed-current stable tags before apply (registry tag must exist).
monitoring_vmsingle_image: "victoriametrics/victoria-metrics:v1.102.1"
monitoring_vmalert_image: "victoriametrics/vmalert:v1.102.1"
monitoring_alertmanager_image: "prom/alertmanager:v0.27.0"
monitoring_grafana_image: "grafana/grafana:11.2.0"
monitoring_ntfy_image: "binwiederhier/ntfy:v2.11.0"
monitoring_redis_exporter_image: "oliver006/redis_exporter:v1.62.0"
monitoring_blackbox_image: "prom/blackbox-exporter:v0.25.0"
monitoring_snmp_exporter_image: "prom/snmp-exporter:v0.26.0"

monitoring_retention: "30d"          # modest, given constrained storage
monitoring_scrape_interval: "30s"

# Kiosk playlist. The kiosk screen auto-rotates through every dashboard tagged
# `monitoring_kiosk_tag` (so new rotated dashboards join just by carrying the tag).
# Each is a single-screen 1920x1080 no-scroll layout with the Front CCTV strip
# pinned at the top. The Grafana file provisioner can't create playlists, so the
# role creates it via the Grafana API (idempotent).
monitoring_kiosk_playlist_name: "Lab Kiosk"
monitoring_kiosk_tag: "kiosk"
monitoring_kiosk_rotate_interval: "30s"

# Scrape targets supplied by the deploy from inventory (no IPs in the role). Each
# entry is a {target: "ip:port", instance: "hostname"} mapping so the scraped series
# carry the real hostname as their `instance` label (dashboards read hostnames, not
# IPs). An empty list omits that job.
monitoring_node_targets: []          # node_exporter on the bare-metal hosts (:9100)
monitoring_blocky_targets: []        # blocky /metrics (:4000)
monitoring_patroni_targets: []       # Patroni REST /metrics (:8008)
monitoring_etcd_targets: []          # etcd /metrics (:2379)
monitoring_redis_targets: []         # redis endpoints (:6379) via redis_exporter

# blackbox_exporter https probes (cert expiry). Plain list of https URLs; the URL
# becomes the `instance` label (blackbox standard pattern).
monitoring_blackbox_targets: []      # e.g. ["https://grafana.cypherworks.co.uk"]

# snmp_exporter targets — the Synology NAS over SNMPv3. {target: "ip:161", instance}.
monitoring_snmp_targets: []

# Headscale control-plane /metrics, reached over the overlay. "tailnet-ip:9090".
monitoring_headscale_target: ""

# Alert thresholds — tunable from the deploy.
monitoring_temp_warn_celsius: 75
monitoring_disk_used_percent: 85

# Grafana — site values from the deploy. OIDC endpoints are authentik's GLOBAL
# ones (not per-app); verified against integrations.goauthentik.io/monitoring/grafana.
monitoring_grafana_root_url: ""              # https://grafana.cypherworks.co.uk
monitoring_grafana_admin_user: "admin"
monitoring_grafana_oidc_auth_url: ""         # https://auth.cw/application/o/authorize/
monitoring_grafana_oidc_token_url: ""        # https://auth.cw/application/o/token/
monitoring_grafana_oidc_api_url: ""          # https://auth.cw/application/o/userinfo/
monitoring_grafana_oidc_signout_url: ""      # https://auth.cw/application/o/grafana/end-session/
# Map authentik groups → Grafana roles. grafana-admins → Admin, everyone else
# (i.e. grafana-users, who are the only ones the app lets in) → Editor.
monitoring_grafana_role_path: "contains(groups[*], 'grafana-admins') && 'Admin' || 'Editor'"

# ntfy
monitoring_ntfy_base_url: ""                 # public base URL ntfy serves on
monitoring_ntfy_topic: "lab-alerts"
monitoring_ntfy_user: ""                     # human username (web UI + phone app), from deploy

# Secrets — from SOPS (deploy), never defaulted in real use.
monitoring_grafana_admin_password: ""
monitoring_grafana_oidc_client_id: ""
monitoring_grafana_oidc_client_secret: ""
monitoring_redis_password: ""
monitoring_ntfy_alertmanager_password: ""    # alertmanager ntfy user (publish to the topic)
monitoring_ntfy_user_password: ""            # human ntfy user (subscribe)

# SNMPv3 (authPriv) creds for the Synology NAS — from SOPS (deploy). The DSM side
# uses SHA auth + AES privacy (set explicitly on both ends).
monitoring_snmp_v3_username: ""
monitoring_snmp_v3_auth_password: ""         # SNMPv3 auth password
monitoring_snmp_v3_priv_password: ""         # SNMPv3 privacy (encryption) password
monitoring_snmp_v3_auth_protocol: "SHA"
monitoring_snmp_v3_priv_protocol: "AES"
