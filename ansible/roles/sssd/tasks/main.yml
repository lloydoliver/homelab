---
# Identity-only SSSD: installs SSSD, writes the LDAP config + CA, points NSS at it.
# No PAM, no sshd — cannot affect login or sudo. Verify with `id <user>` / `getent`.
- name: Install SSSD and LDAP client packages
  become: true
  ansible.builtin.apt:
    name: "{{ sssd_packages }}"
    state: present
    update_cache: true

- name: Install the OpenBao CA the outpost's LDAPS cert chains to
  become: true
  ansible.builtin.copy:
    content: "{{ sssd_ldap_ca_cert }}"
    dest: "{{ sssd_ldap_ca_cert_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart sssd

- name: Render the SSSD config
  become: true
  ansible.builtin.template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    owner: root
    group: root
    # 0600 is mandatory — sssd refuses to start on a looser config, and it holds the
    # bind app password.
    mode: "0600"
  notify: Restart sssd

- name: Point NSS at SSSD for passwd/group
  become: true
  ansible.builtin.lineinfile:
    path: /etc/nsswitch.conf
    regexp: "^{{ item.db }}:"
    line: "{{ item.db }}: {{ item.value }}"
  loop: "{{ sssd_nsswitch }}"
  loop_control:
    label: "{{ item.db }}"

- name: Enable and start SSSD
  become: true
  ansible.builtin.systemd_service:
    name: sssd
    enabled: true
    state: started

# --- PAM login/sudo — CONNECTIVITY-SENSITIVE, only when explicitly enabled ----
# Wires pam_sss (sudo password against Authentik, ssh-users access gate) and
# pam_mkhomedir (auto home dirs). Local root/ansible are unaffected (unknown to
# SSSD → pam_unix admits them; key-based SSH never hits the PAM auth stack).
- name: Configure PAM for SSSD login/sudo
  when: sssd_enable_pam_auth | bool
  block:
    - name: Ensure the SSSD + mkhomedir PAM modules are installed
      become: true
      ansible.builtin.apt:
        name:
          - libpam-sss
          - libpam-modules   # provides pam_mkhomedir + its pam-config
        state: present

    - name: Check whether the mkhomedir PAM profile is already active
      become: true
      ansible.builtin.command: grep -q pam_mkhomedir.so /etc/pam.d/common-session
      register: sssd_mkhomedir_active
      changed_when: false
      failed_when: false

    # pam-auth-update is Debian's sanctioned, reversible way to edit the common-*
    # stack (keeps pam_unix, so local accounts still authenticate). Guarded so it's
    # idempotent. NOTE: on CIS-hardened hosts, verify the faillock/pwquality config
    # still composes after this — check at the rig with a held root session.
    - name: Enable the SSSD + mkhomedir PAM profiles
      become: true
      ansible.builtin.command: "pam-auth-update --enable {{ sssd_pam_profiles | join(' ') }}"
      when: sssd_mkhomedir_active.rc != 0
      changed_when: true
