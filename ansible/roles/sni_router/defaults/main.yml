---
# L4 SNI passthrough router (nginx stream + ssl_preread). Terminates NO TLS — it
# reads the SNI from the ClientHello and proxies the raw connection on, so the
# backend (Headscale locally, or the lab Caddy over the overlay) does its own TLS.
# This is what keeps the EC2 a dumb pipe that can't read the auth login.

sni_listen_port: 443

# Route map: SNI hostname -> backend host:port. Supplied by the deployment.
#   - { sni: "headscale.cypherworks.co.uk", upstream: "127.0.0.1:8443" }
#   - { sni: "auth.cypherworks.co.uk",      upstream: "10.200.30.10:443" }
sni_routes: []

# Where an unrecognised SNI goes (Headscale, which will simply reject it).
sni_default_upstream: "127.0.0.1:8443"

# Stream proxy idle timeout — long, since Headscale holds long-poll connections.
sni_proxy_timeout: "10m"
