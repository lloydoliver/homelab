---
# Docker itself comes from the shared `docker` role (meta dependency).
- name: Create the speedtest directory
  become: true
  ansible.builtin.file:
    path: "{{ speedtest_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render the speedtest env (APP_KEY secret)
  become: true
  ansible.builtin.template:
    src: env.j2
    dest: "{{ speedtest_compose_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  notify: Restart speedtest

- name: Render the speedtest compose
  become: true
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ speedtest_compose_dir }}/compose.yaml"
    owner: root
    group: root
    mode: "0600"
  notify: Restart speedtest

- name: Start the speedtest stack
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ speedtest_compose_dir }}"
    state: present
    pull: missing
