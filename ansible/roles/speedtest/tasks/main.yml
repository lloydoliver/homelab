---
# Same shape as the monitoring role: Docker from the official repo, then a compose
# stack. (A shared 'docker' role would DRY the install across both — noted, not
# done here.)
- name: Add Docker's official APT repository
  become: true
  ansible.builtin.deb822_repository:
    name: docker
    types: [deb]
    uris: "https://download.docker.com/linux/debian"
    suites: "{{ ansible_distribution_release }}"
    components: [stable]
    signed_by: https://download.docker.com/linux/debian/gpg

- name: Install Docker Engine + Compose v2 plugin
  become: true
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Create the speedtest directory
  become: true
  ansible.builtin.file:
    path: "{{ speedtest_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render the speedtest env (APP_KEY secret)
  become: true
  ansible.builtin.template:
    src: env.j2
    dest: "{{ speedtest_compose_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  notify: Restart speedtest

- name: Render the speedtest compose
  become: true
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ speedtest_compose_dir }}/compose.yaml"
    owner: root
    group: root
    mode: "0640"
  notify: Restart speedtest

- name: Start the speedtest stack
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ speedtest_compose_dir }}"
    state: present
    pull: missing
