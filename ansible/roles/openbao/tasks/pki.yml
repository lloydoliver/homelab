---
# PKI reconcile. Idempotent: mounts/URLs/roles are safe to re-apply, and the root CA
# is generated exactly ONCE — guarded on an existing CA — so a normal re-run or a
# post-snapshot-restore run never regenerates (and never invalidates) the root.
# All commands talk to the local listener with the root token from SOPS.
- name: Reconcile the PKI engine
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_root_token }}"
    BAO_SKIP_VERIFY: "true"
  block:
    - name: Enable the PKI secrets engine
      ansible.builtin.command:
        cmd: "bao secrets enable -path={{ openbao_pki_mount }} pki"
      register: openbao_pki_enable
      changed_when: openbao_pki_enable.rc == 0
      failed_when:
        - openbao_pki_enable.rc != 0
        - "'path is already in use' not in openbao_pki_enable.stderr"

    - name: Tune the PKI max lease TTL
      ansible.builtin.command:
        cmd: "bao secrets tune -max-lease-ttl={{ openbao_pki_max_lease_ttl }} {{ openbao_pki_mount }}"
      changed_when: true

    - name: Check whether a root CA already exists
      ansible.builtin.command:
        cmd: "bao read -field=certificate {{ openbao_pki_mount }}/cert/ca"
      register: openbao_pki_ca
      changed_when: false
      failed_when: false

    - name: Generate the root CA (once — the guard below stops it overwriting an existing root)
      ansible.builtin.command:
        argv:
          - bao
          - write
          - "{{ openbao_pki_mount }}/root/generate/internal"
          - "common_name={{ openbao_pki_root_common_name }}"
          - "ttl={{ openbao_pki_root_ttl }}"
      when: openbao_pki_ca.rc != 0 or (openbao_pki_ca.stdout | trim | length == 0)
      register: openbao_pki_root_gen
      changed_when: openbao_pki_root_gen.rc == 0
      no_log: true

    - name: Configure the PKI issuing + CRL URLs
      ansible.builtin.command:
        cmd: >-
          bao write {{ openbao_pki_mount }}/config/urls
          issuing_certificates={{ openbao_pki_issuing_url }}
          crl_distribution_points={{ openbao_pki_crl_url }}
      changed_when: true

    - name: Create the PKI issuing roles
      ansible.builtin.command:
        cmd: >-
          bao write {{ openbao_pki_mount }}/roles/{{ item.name }}
          allowed_domains={{ item.allowed_domains }}
          allow_subdomains={{ item.allow_subdomains | default(true) | string | lower }}
          max_ttl={{ item.max_ttl | default('72h') }}
      loop: "{{ openbao_pki_roles }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true
