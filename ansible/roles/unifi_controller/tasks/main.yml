---
- name: Require the MongoDB password (supplied from SOPS)
  ansible.builtin.assert:
    that: unifi_mongo_password | default("") | length > 0
    fail_msg: "unifi_mongo_password is not set — supply it from the SOPS secret."

- name: Ensure the controller data + bind-mount directories exist
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ unifi_data_dir }}"
    - "{{ unifi_data_dir }}/mongo"   # mongo /data/db bind-mount source
    - "{{ unifi_data_dir }}/config"  # unifi /config bind-mount source
  # Synology's Docker won't auto-create bind-mount source dirs; the containers
  # chown them on first start (mongo + the LinuxServer image both do).

- name: Render the MongoDB init script
  become: true
  ansible.builtin.template:
    src: mongo-init.js.j2
    dest: "{{ unifi_data_dir }}/mongo-init.js"
    mode: "0600"

- name: Render the controller compose file
  become: true
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ unifi_data_dir }}/compose.yaml"
    mode: "0600"

- name: Deploy the controller stack
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ unifi_data_dir }}"
    docker_cli: "{{ unifi_docker_cli | default(omit) }}"
    state: present
    pull: missing
