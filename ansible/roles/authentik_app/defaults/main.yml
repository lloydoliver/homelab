---
# Authentik app tier: server + worker only (the HA Postgres/Redis data tier is
# external, reached via the node-local HAProxy frontends at 127.0.0.1). One app
# node per cluster member; Caddy load-balances the servers.

# PIN to a confirmed current stable before apply — verify against
# https://github.com/goauthentik/authentik/releases (the registry tag must exist).
authentik_image: "ghcr.io/goauthentik/server:2025.6.4"

# LDAP outpost image — MUST track the server version (outpost protocol is tied to
# the core release). Pin the same tag as authentik_image in the deploy.
authentik_ldap_outpost_image: "ghcr.io/goauthentik/ldap:2025.6.4"

authentik_compose_dir: /opt/authentik
authentik_server_port: 9000

# Postgres/Redis via the node's local HAProxy frontends — reached on the node's
# lab IP (not loopback), because the containers run on the compose bridge, not
# host networking. ansible_default_ipv4.address is the app node's VLAN-30 address.
authentik_pg_host: "{{ ansible_default_ipv4.address }}"
authentik_pg_port: 5000
authentik_pg_name: authentik
authentik_pg_user: authentik

# Redis via the local HAProxy role:master frontend (Authentik has no Sentinel
# support, so it must see a single endpoint; Sentinel drives the failover).
authentik_redis_host: "{{ ansible_default_ipv4.address }}"
authentik_redis_port: 6379

# Blueprints rendered here, mounted read-only at /blueprints/custom in the
# containers; authentik discovers + reconciles them. Add an integration by adding
# a template under templates/blueprints/ and a render task (see the headscale one).
authentik_blueprints_dir: "{{ authentik_compose_dir }}/blueprints"

# Media dir mounted at /media in the containers (authentik serves uploaded assets
# from there). Branding files are copied into <dir>/public and referenced by the
# brand as /media/public/<name>. The file list + the brand logo/favicon paths are
# site data — set in the deploy; empty here leaves authentik's stock branding.
authentik_media_dir: "{{ authentik_compose_dir }}/media"
authentik_branding_files: []
authentik_branding_logo_path: ""
authentik_branding_favicon_path: ""

# Login card heading — the default authentication flow's title, set by the core
# blueprint. Empty leaves authentik's default ("Welcome to authentik!"). Site data.
authentik_login_title: ""

# Headscale OIDC: the blueprint reads the client id/secret via !Env (one source of
# truth that the headscale role's OIDC config also reads from SOPS). The redirect
# URI is the deployment's Headscale callback — supplied by the deploy, not defaulted
# here (no site data in the role).
headscale_oidc_redirect_uri: ""

# NAS (Synology DSM) OIDC redirect URIs — the bare base URLs DSM is reached on
# (internal + external), no callback path. Site data — set in the deploy.
nas_oidc_redirect_uris: []

# Grafana OIDC redirect URI — Grafana's generic_oauth callback
# (https://grafana.<domain>/login/generic_oauth). Site data — set in the deploy.
grafana_oidc_redirect_uri: ""

# Email set on the bootstrap superuser (akadmin) by the core blueprint, freeing a
# personal address for a human account. Site data — set in the deploy.
authentik_admin_email: ""

# LDAP outpost (SSSD host auth). All site data — set in the deploy. base_dn is what
# the outpost serves; outpost_host is the public Authentik URL the container dials
# back on. ldap_outpost_token (the SA token key / outpost AUTHENTIK_TOKEN) is a secret
# from SOPS. The blueprint binds that key to the outpost's auto-created service
# account (see blueprints/ldap.yaml.j2).
authentik_ldap_base_dn: ""
authentik_ldap_outpost_host: ""
ldap_outpost_token: ""
# LDAPS server cert/key (PEM) for the outpost's 6636 listener, from SOPS. Empty =
# the outpost serves a self-signed cert and the provider certificate is left unset.
ldaps_cert: ""
ldaps_key: ""

# Secrets — from SOPS, never defaulted in real use:
#   authentik_secret_key, authentik_pg_password, authentik_redis_password,
#   authentik_bootstrap_password, headscale_oidc_client_id/_secret,
#   nas_oidc_client_id/_secret, grafana_oidc_client_id/_secret, ldap_outpost_token
authentik_secret_key: ""
authentik_pg_password: ""
authentik_redis_password: ""
authentik_bootstrap_password: ""
headscale_oidc_client_id: ""
headscale_oidc_client_secret: ""
nas_oidc_client_id: ""
nas_oidc_client_secret: ""
grafana_oidc_client_id: ""
grafana_oidc_client_secret: ""
# OpenBao OIDC — the blueprint reads the client id/secret via !Env (same SOPS source
# the openbao role's OIDC config reads). redirect_uris are OpenBao's UI + CLI
# callbacks and must match the openbao role's allowed_redirect_uris exactly.
openbao_oidc_client_id: ""
openbao_oidc_client_secret: ""
openbao_oidc_redirect_uris: []
