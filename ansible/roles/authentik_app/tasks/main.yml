---
- name: Add Docker's official APT repository
  become: true
  ansible.builtin.deb822_repository:
    name: docker
    types: [deb]
    uris: "https://download.docker.com/linux/debian"
    suites: "{{ ansible_distribution_release }}"
    components: [stable]
    signed_by: https://download.docker.com/linux/debian/gpg

# Debian's docker-compose-v2 isn't in the minimal Incus cloud image; Docker's own
# repo ships the engine + the compose v2 plugin reliably.
- name: Install Docker Engine + Compose v2 plugin
  become: true
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Create the Authentik compose directory
  become: true
  ansible.builtin.file:
    path: "{{ authentik_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create the blueprints directory
  become: true
  ansible.builtin.file:
    path: "{{ authentik_blueprints_dir }}"
    state: directory
    owner: root
    group: root
    # World-readable: the dir is bind-mounted into the container, which runs as a
    # non-root user that must read it to discover the blueprints. No secrets here
    # (the blueprint reads creds via !Env).
    mode: "0755"

# authentik runs blueprint discovery at worker startup, not via a live file-watch,
# so a re-rendered blueprint is only picked up on restart — hence the notify.
# Add an integration by dropping templates/blueprints/<name>.yaml.j2 and adding
# <name> to this loop.
- name: Render the authentik blueprints
  become: true
  ansible.builtin.template:
    src: "blueprints/{{ item }}.yaml.j2"
    dest: "{{ authentik_blueprints_dir }}/{{ item }}.yaml"
    owner: root
    group: root
    # Readable by the container's non-root user (mounted in); no secrets in the files.
    mode: "0644"
  loop:
    - headscale
    - core
  notify: Restart authentik

- name: Render the Authentik env
  become: true
  ansible.builtin.template:
    src: env.j2
    dest: "{{ authentik_compose_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  notify: Restart authentik

- name: Render the Authentik compose
  become: true
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ authentik_compose_dir }}/compose.yaml"
    owner: root
    group: root
    mode: "0640"
  notify: Restart authentik

- name: Start Authentik (server + worker)
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ authentik_compose_dir }}"
    state: present
    pull: missing
