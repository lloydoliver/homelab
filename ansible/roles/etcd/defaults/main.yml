---
# etcd cluster — the Patroni DCS (quorum) for the Authentik HA data tier.
# Members and their bind IPs come from the consuming inventory (etcd_members);
# this role derives each host's bind address by matching inventory_hostname.

etcd_version: "3.5.16"
# Mixed estate: amd64 on the ThinkCentre containers, arm64 on the Pi witness.
etcd_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
etcd_release_base: "https://github.com/etcd-io/etcd/releases/download"
etcd_archive: "etcd-v{{ etcd_version }}-linux-{{ etcd_arch }}.tar.gz"
etcd_url: "{{ etcd_release_base }}/v{{ etcd_version }}/{{ etcd_archive }}"

etcd_data_dir: /var/lib/etcd
etcd_conf_dir: /etc/etcd
etcd_config_file: "{{ etcd_conf_dir }}/etcd.conf.yml"
etcd_cluster_token: authentik-etcd
# Flip to 'existing' (per-host, temporarily) only when re-adding a member to a
# live cluster — see README.
etcd_initial_cluster_state: new

# Required from inventory (no default): the full member list, e.g.
#   etcd_members:
#     - { name: etcd-tc1, ip: 10.200.30.31 }
#     - { name: etcd-tc2, ip: 10.200.30.32 }
#     - { name: pi-dns-1, ip: 10.200.30.13 }
# This host's bind IP, matched by inventory_hostname:
etcd_bind_ip: "{{ etcd_members | selectattr('name', 'equalto', inventory_hostname) | map(attribute='ip') | first }}"
