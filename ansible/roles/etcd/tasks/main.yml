---
- name: Create the etcd system group
  become: true
  ansible.builtin.group:
    name: etcd
    system: true

- name: Create the etcd system user
  become: true
  ansible.builtin.user:
    name: etcd
    group: etcd
    system: true
    shell: /usr/sbin/nologin
    home: "{{ etcd_data_dir }}"
    create_home: false

- name: Download the pinned etcd release
  become: true
  ansible.builtin.get_url:
    url: "{{ etcd_url }}"
    dest: "/tmp/{{ etcd_archive }}"
    mode: "0644"

- name: Extract etcd binaries
  become: true
  ansible.builtin.unarchive:
    src: "/tmp/{{ etcd_archive }}"
    dest: /usr/local/bin
    remote_src: true
    extra_opts:
      - --strip-components=1
      - --wildcards
      - "*/etcd"
      - "*/etcdctl"
    creates: "/usr/local/bin/etcd"

- name: Ensure etcd binaries are executable
  become: true
  ansible.builtin.file:
    path: "/usr/local/bin/{{ item }}"
    mode: "0755"
    owner: root
    group: root
  loop:
    - etcd
    - etcdctl

- name: Create the etcd config directory
  become: true
  ansible.builtin.file:
    path: "{{ etcd_conf_dir }}"
    state: directory
    owner: root
    group: etcd
    mode: "0750"

- name: Create the etcd data directory
  become: true
  ansible.builtin.file:
    path: "{{ etcd_data_dir }}"
    state: directory
    owner: etcd
    group: etcd
    mode: "0700"

- name: Render the etcd config
  become: true
  ansible.builtin.template:
    src: etcd.conf.yml.j2
    dest: "{{ etcd_config_file }}"
    owner: root
    group: etcd
    mode: "0640"
  notify: Restart etcd

- name: Install the etcd systemd unit
  become: true
  ansible.builtin.template:
    src: etcd.service.j2
    dest: /etc/systemd/system/etcd.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart etcd

- name: Enable and start etcd
  become: true
  ansible.builtin.systemd_service:
    name: etcd
    enabled: true
    state: started
    daemon_reload: true
