---
- name: Install Redis server (data nodes only)
  become: true
  ansible.builtin.apt:
    name: redis-server
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: "'authentik_redis' in group_names"

- name: Install Redis Sentinel (all quorum members)
  become: true
  ansible.builtin.apt:
    name: redis-sentinel
    state: present
    update_cache: true
    cache_valid_time: 3600

# Write once, overwriting the stock Debian config, then leave it alone — Redis and
# Sentinel both rewrite their own configs at runtime (replicaof, discovered peers)
# after a Sentinel failover, so re-asserting would fight them. The marker makes
# this first-boot-only; force:false silently skipped because the package ships a
# default at this path.
- name: Check whether Redis/Sentinel has been bootstrapped
  become: true
  ansible.builtin.stat:
    path: "{{ redis_conf_dir }}/.lab-configured"
  register: redis_lab_marker

- name: Render redis.conf (first bootstrap only)
  become: true
  ansible.builtin.template:
    src: redis.conf.j2
    dest: "{{ redis_conf_dir }}/redis.conf"
    owner: redis
    group: redis
    mode: "0640"
  when:
    - "'authentik_redis' in group_names"
    - not redis_lab_marker.stat.exists
  notify: Restart redis-server

- name: Render sentinel.conf (first bootstrap only)
  become: true
  ansible.builtin.template:
    src: sentinel.conf.j2
    dest: "{{ redis_conf_dir }}/sentinel.conf"
    owner: redis
    group: redis
    mode: "0640"
  when: not redis_lab_marker.stat.exists
  notify: Restart redis-sentinel

- name: Mark Redis/Sentinel bootstrapped
  become: true
  ansible.builtin.file:
    path: "{{ redis_conf_dir }}/.lab-configured"
    state: touch
    owner: redis
    group: redis
    mode: "0640"
  when: not redis_lab_marker.stat.exists

- name: Enable and start Redis server (data nodes)
  become: true
  ansible.builtin.systemd_service:
    name: redis-server
    enabled: true
    state: started
  when: "'authentik_redis' in group_names"

- name: Enable and start Redis Sentinel
  become: true
  ansible.builtin.systemd_service:
    name: redis-sentinel
    enabled: true
    state: started
