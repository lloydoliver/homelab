---
- name: Add the Tailscale apt repository
  become: true
  ansible.builtin.deb822_repository:
    name: tailscale
    types: [deb]
    uris: "https://pkgs.tailscale.com/stable/ubuntu"
    suites: "{{ ansible_distribution_release }}"
    components: [main]
    signed_by: "https://pkgs.tailscale.com/stable/ubuntu/{{ ansible_distribution_release }}.noarmor.gpg"

- name: Install Tailscale
  become: true
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true

- name: Enable and start tailscaled
  become: true
  ansible.builtin.systemd_service:
    name: tailscaled
    enabled: true
    state: started

- name: Get the current Tailscale backend state
  become: true
  ansible.builtin.command: tailscale status --json
  register: tailscale_state
  changed_when: false
  failed_when: false

# Bring up only if not already Running, so re-runs don't churn the connection.
- name: Join the overlay
  become: true
  ansible.builtin.command: >-
    tailscale up
    --login-server {{ tailscale_login_server }}
    --authkey {{ tailscale_authkey }}
    {{ '--accept-routes' if tailscale_accept_routes else '' }}
    --hostname {{ tailscale_hostname }}
  register: tailscale_up
  changed_when: true
  no_log: true
  when: >-
    tailscale_state.rc != 0 or
    ((tailscale_state.stdout | from_json).BackendState | default('')) != 'Running'
