---
# Docker itself comes from the shared `docker` role (meta dependency).
- name: Create the vaultwarden directory
  become: true
  ansible.builtin.file:
    path: "{{ vaultwarden_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render the vaultwarden env (config + admin token)
  become: true
  ansible.builtin.template:
    src: vaultwarden.env.j2
    dest: "{{ vaultwarden_compose_dir }}/vaultwarden.env"
    owner: root
    group: root
    mode: "0600"
  notify: Restart vaultwarden

- name: Render the vaultwarden compose
  become: true
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ vaultwarden_compose_dir }}/compose.yaml"
    owner: root
    group: root
    mode: "0640"
  notify: Restart vaultwarden

- name: Start the vaultwarden stack
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ vaultwarden_compose_dir }}"
    state: present
    pull: missing
